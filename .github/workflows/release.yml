name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-macos:
    name: Build macOS Apple Silicon release
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --arch arm64

      - name: Assemble application bundle
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          APP="dist/Framelet.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$(swift build -c release --arch arm64 --show-bin-path)/Framelet" "$APP/Contents/MacOS/Framelet"
          chmod +x "$APP/Contents/MacOS/Framelet"

          if [[ -f asset/FrameletIcon.png ]]; then
            ICON_SOURCE="asset/FrameletIcon.png"
          elif [[ -f asset/功能界面.png ]]; then
            ICON_SOURCE="asset/功能界面.png"
          else
            ICON_SOURCE=""
          fi

          if [[ -n "$ICON_SOURCE" ]]; then
            ICONSET="$RUNNER_TEMP/Framelet.iconset"
            mkdir -p "$ICONSET"
            sips -z 16 16 "$ICON_SOURCE" --out "$ICONSET/icon_16x16.png" >/dev/null
            sips -z 32 32 "$ICON_SOURCE" --out "$ICONSET/icon_16x16@2x.png" >/dev/null
            sips -z 32 32 "$ICON_SOURCE" --out "$ICONSET/icon_32x32.png" >/dev/null
            sips -z 64 64 "$ICON_SOURCE" --out "$ICONSET/icon_32x32@2x.png" >/dev/null
            sips -z 128 128 "$ICON_SOURCE" --out "$ICONSET/icon_128x128.png" >/dev/null
            sips -z 256 256 "$ICON_SOURCE" --out "$ICONSET/icon_128x128@2x.png" >/dev/null
            sips -z 256 256 "$ICON_SOURCE" --out "$ICONSET/icon_256x256.png" >/dev/null
            sips -z 512 512 "$ICON_SOURCE" --out "$ICONSET/icon_256x256@2x.png" >/dev/null
            sips -z 512 512 "$ICON_SOURCE" --out "$ICONSET/icon_512x512.png" >/dev/null
            sips -z 1024 1024 "$ICON_SOURCE" --out "$ICONSET/icon_512x512@2x.png" >/dev/null
            iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/Framelet.icns"
          fi

          CLEAN_VERSION="${VERSION#v}"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>Framelet</string>
            <key>CFBundleIdentifier</key><string>dev.openspring.Framelet</string>
            <key>CFBundleName</key><string>Framelet</string>
            <key>CFBundleIconFile</key><string>Framelet.icns</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>$CLEAN_VERSION</string>
            <key>CFBundleVersion</key><string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSPrincipalClass</key><string>NSApplication</string>
          </dict></plist>
          PLIST

          codesign --force --deep --sign - "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "dist/Framelet-${VERSION}-macOS-arm64.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/Framelet-*-macOS-arm64.zip
