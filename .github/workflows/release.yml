name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-macos:
    name: Build macOS Apple Silicon release
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Swift 6 toolchain
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          swift --version

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          : "${DEVELOPER_ID_CERTIFICATE_BASE64:?Missing signing certificate secret}"
          : "${DEVELOPER_ID_CERTIFICATE_PASSWORD:?Missing certificate password secret}"
          : "${KEYCHAIN_PASSWORD:?Missing keychain password secret}"
          KEYCHAIN="$RUNNER_TEMP/framelet-signing.keychain-db"
          echo "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/developer-id.p12" -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Build release binary
        run: swift build -c release --arch arm64

      - name: Assemble application bundle
        env:
          VERSION: ${{ github.ref_name }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="dist/Framelet.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          BUILD_DIR="$(swift build -c release --arch arm64 --show-bin-path)"
          cp "$BUILD_DIR/Framelet" "$APP/Contents/MacOS/Framelet"
          cp "$BUILD_DIR/FrameletUpdater" "$APP/Contents/MacOS/FrameletUpdater"
          cp -R "$BUILD_DIR/Framelet_Framelet.bundle" "$APP/Contents/Resources/"
          for LOCALIZATION in "$BUILD_DIR/Framelet_Framelet.bundle"/*.lproj; do
            [[ -d "$LOCALIZATION" ]] || continue
            cp -R "$LOCALIZATION" "$APP/Contents/Resources/"
          done
          chmod +x "$APP/Contents/MacOS/Framelet" "$APP/Contents/MacOS/FrameletUpdater"

          if [[ -f asset/FrameletIcon.png ]]; then
            ICON_SOURCE="asset/FrameletIcon.png"
          elif [[ -f asset/功能界面.png ]]; then
            ICON_SOURCE="asset/功能界面.png"
          else
            ICON_SOURCE=""
          fi

          if [[ -n "$ICON_SOURCE" ]]; then
            ICONSET="$RUNNER_TEMP/Framelet.iconset"
            mkdir -p "$ICONSET"
            sips -z 16 16 "$ICON_SOURCE" --out "$ICONSET/icon_16x16.png" >/dev/null
            sips -z 32 32 "$ICON_SOURCE" --out "$ICONSET/icon_16x16@2x.png" >/dev/null
            sips -z 32 32 "$ICON_SOURCE" --out "$ICONSET/icon_32x32.png" >/dev/null
            sips -z 64 64 "$ICON_SOURCE" --out "$ICONSET/icon_32x32@2x.png" >/dev/null
            sips -z 128 128 "$ICON_SOURCE" --out "$ICONSET/icon_128x128.png" >/dev/null
            sips -z 256 256 "$ICON_SOURCE" --out "$ICONSET/icon_128x128@2x.png" >/dev/null
            sips -z 256 256 "$ICON_SOURCE" --out "$ICONSET/icon_256x256.png" >/dev/null
            sips -z 512 512 "$ICON_SOURCE" --out "$ICONSET/icon_256x256@2x.png" >/dev/null
            sips -z 512 512 "$ICON_SOURCE" --out "$ICONSET/icon_512x512.png" >/dev/null
            sips -z 1024 1024 "$ICON_SOURCE" --out "$ICONSET/icon_512x512@2x.png" >/dev/null
            iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/Framelet.icns"
          fi

          CLEAN_VERSION="${VERSION#v}"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>Framelet</string>
            <key>CFBundleIdentifier</key><string>dev.openspring.Framelet</string>
            <key>CFBundleName</key><string>Framelet</string>
            <key>CFBundleDevelopmentRegion</key><string>en</string>
            <key>CFBundleLocalizations</key><array><string>en</string><string>zh-Hans</string></array>
            <key>CFBundleIconFile</key><string>Framelet.icns</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>$CLEAN_VERSION</string>
            <key>CFBundleVersion</key><string>${{ github.run_number }}</string>
            <key>FrameletUpdateTeamIdentifier</key><string>$APPLE_TEAM_ID</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSPrincipalClass</key><string>NSApplication</string>
          </dict></plist>
          PLIST

          : "${DEVELOPER_ID_APPLICATION:?Missing Developer ID identity secret}"
          : "${APPLE_TEAM_ID:?Missing Apple Team ID secret}"
          codesign --force --options runtime --timestamp --sign "$DEVELOPER_ID_APPLICATION" "$APP/Contents/MacOS/FrameletUpdater"
          codesign --force --deep --options runtime --timestamp --sign "$DEVELOPER_ID_APPLICATION" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "dist/Framelet-${VERSION}-macOS-arm64.zip"

      - name: Notarize and staple application
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          : "${APPLE_ID:?Missing notarization Apple ID secret}"
          : "${APPLE_APP_PASSWORD:?Missing app-specific password secret}"
          xcrun notarytool submit "dist/Framelet-${VERSION}-macOS-arm64.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "dist/Framelet.app"
          spctl --assess --type execute --verbose=2 "dist/Framelet.app"
          rm "dist/Framelet-${VERSION}-macOS-arm64.zip"
          ditto -c -k --sequesterRsrc --keepParent "dist/Framelet.app" "dist/Framelet-${VERSION}-macOS-arm64.zip"
          cp "dist/Framelet-${VERSION}-macOS-arm64.zip" "dist/Framelet-macOS-arm64.zip"
          shasum -a 256 "dist/Framelet-${VERSION}-macOS-arm64.zip" > "dist/Framelet-${VERSION}-macOS-arm64.zip.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Framelet-*-macOS-arm64.zip
            dist/Framelet-macOS-arm64.zip
            dist/Framelet-*-macOS-arm64.zip.sha256
